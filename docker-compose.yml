version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: collabbridge-db
    environment:
      POSTGRES_DB: collabbridge
      POSTGRES_USER: collabbridge_user
      POSTGRES_PASSWORD: collabbridge_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - collabbridge-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: collabbridge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - collabbridge-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collabbridge-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://collabbridge_user:collabbridge_password@postgres:5432/collabbridge
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:4321
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - collabbridge-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collabbridge-frontend
    ports:
      - "4321:80"
    depends_on:
      - backend
    networks:
      - collabbridge-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  collabbridge-network:
    driver: bridge
