services:
  - type: web
    name: collabbridge-api
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collabbridge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: collabbridge-redis
          property: connectionString

databases:
  - name: collabbridge-db
    databaseName: collabbridge
    plan: starter

services:
  - type: redis
    name: collabbridge-redis
    plan: starter