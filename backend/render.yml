services:
  # Backend API Service
  - type: web
    name: collabbridge-backend
    runtime: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    envVars:
      # Database Configuration
      - key: DATABASE_URL
        fromDatabase:
          name: collabbridge-db
          property: connectionString
      
      # JWT Configuration
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
      
      # CORS Configuration
      - key: FRONTEND_URL
        value: "https://collabbridge-frontend.onrender.com"
      
      # Rate Limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "1000"
      
      # Logging
      - key: LOG_LEVEL
        value: "info"
      
      # Firebase Configuration (these need to be set manually in Render dashboard)
      - key: FIREBASE_PROJECT_ID
        value: "collabbridge-2c528"
      - key: FIREBASE_CLIENT_EMAIL
        value: "firebase-adminsdk-fbsvc@collabbridge-2c528.iam.gserviceaccount.com"
      # FIREBASE_PRIVATE_KEY needs to be set manually with the full private key

  # Frontend Static Site
  - type: static
    name: collabbridge-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    rootDir: frontend
    env:
      - key: NODE_ENV
        value: production
    envVars:
      # React App Configuration
      - key: REACT_APP_API_URL
        value: "https://collabbridge-backend.onrender.com/api"
      
      # Firebase Configuration for Frontend
      - key: REACT_APP_FIREBASE_API_KEY
        value: "AIzaSyDKgDJjN5Z9mQJ5xGqK8rJT-pL6BQND8cM"
      - key: REACT_APP_FIREBASE_AUTH_DOMAIN
        value: "collabbridge-2c528.firebaseapp.com"
      - key: REACT_APP_FIREBASE_PROJECT_ID
        value: "collabbridge-2c528"
      - key: REACT_APP_FIREBASE_STORAGE_BUCKET
        value: "collabbridge-2c528.appspot.com"
      - key: REACT_APP_FIREBASE_MESSAGING_SENDER_ID
        value: "123456789012"
      - key: REACT_APP_FIREBASE_APP_ID
        value: "1:123456789012:web:abcd1234efgh5678"

# Database (already exists but including for reference)
databases:
  - name: collabbridge-db
    plan: free
    databaseName: collabbridge
    user: collabbridge_user